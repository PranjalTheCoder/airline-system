server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy to microservices (production)
    location /api/auth        { proxy_pass http://auth-service:8081;        proxy_set_header Host $host; }
    location /api/flights     { proxy_pass http://flight-service:8082;      proxy_set_header Host $host; }
    location /api/inventory   { proxy_pass http://inventory-service:8083;   proxy_set_header Host $host; }
    location /api/reservations { proxy_pass http://reservation-service:8084; proxy_set_header Host $host; }
    location /api/payments    { proxy_pass http://payment-service:8085;     proxy_set_header Host $host; }
    location /api/tickets     { proxy_pass http://ticketing-service:8086;   proxy_set_header Host $host; }
    location /api/checkin     { proxy_pass http://checkin-service:8087;     proxy_set_header Host $host; }
    location /api/baggage     { proxy_pass http://baggage-service:8088;     proxy_set_header Host $host; }
    location /api/loyalty     { proxy_pass http://loyalty-service:8089;     proxy_set_header Host $host; }
    location /api/operations  { proxy_pass http://operations-service:8090;  proxy_set_header Host $host; }
    location /api/admin       { proxy_pass http://admin-service:8091;       proxy_set_header Host $host; }

    # Angular SPA — all other routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
