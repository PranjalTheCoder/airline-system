server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:

      # 🌐 CORS CONFIG
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # 🚀 ROUTES
      routes:

        # 🟢 ADMIN SERVICE
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/api/admin/**

        # ✈️ FLIGHT SERVICE
        - id: flight-service
          uri: lb://FLIGHT-SERVICE
          predicates:
            - Path=/api/flights/**

        # 🪑 INVENTORY SERVICE (🔥 ADD THIS)
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/inventory/**

# 🔗 EUREKA
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# 🧪 DEBUG LOGS
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
