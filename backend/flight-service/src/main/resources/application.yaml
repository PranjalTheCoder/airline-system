server:
  port: 8082

spring:
  application:
    name: FLIGHT-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/flight_db
    username: root
    password: root@39

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
