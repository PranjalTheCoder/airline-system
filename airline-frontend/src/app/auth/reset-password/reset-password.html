<div class="card">
  <h2>Reset Password</h2>

  <form (ngSubmit)="reset()">
    <input [(ngModel)]="email" name="email" placeholder="Email" />

    <input [(ngModel)]="password" name="password" type="password" placeholder="New Password" />

    <button type="submit">Reset Password</button>
  </form>
</div>
